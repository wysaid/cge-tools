name: Windows Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/instructions/**'
      - '.github/skills/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-windows:
        description: "Windows artifact name"
        value: ${{ jobs.build-windows.outputs.artifact-name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64 (MSVC 2022)
    runs-on: windows-latest
    outputs:
      artifact-name: ${{ steps.package.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          cache: true
          cache-key-prefix: 'install-qt6-windows-msvc2022'

      - name: Install GLEW
        shell: pwsh
        run: |
          $GLEW_VERSION = "2.2.0"
          $GLEW_URL = "https://github.com/nigels-com/glew/releases/download/glew-${GLEW_VERSION}/glew-${GLEW_VERSION}-win32.zip"
          Invoke-WebRequest -Uri $GLEW_URL -OutFile "glew.zip"
          Expand-Archive -Path "glew.zip" -DestinationPath "C:\glew"
          echo "GLEW_ROOT=C:\glew\glew-${GLEW_VERSION}" >> $env:GITHUB_ENV
          echo "Installed GLEW ${GLEW_VERSION} to C:\glew\glew-${GLEW_VERSION}"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-msvc2022-release-${{ hashFiles('CMakeLists.txt', 'cge/CMakeLists.txt', 'filterGenerator/CMakeLists.txt', 'cge/src/**', 'cge/include/**', 'filterGenerator/**/*.cpp', 'filterGenerator/**/*.h') }}
          restore-keys: windows-msvc2022-release-

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_FILTER_GENERATOR=ON ^
            -DBUILD_EXAMPLES=OFF ^
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
            -DGLEW_INCLUDE_DIR="%GLEW_ROOT%\include" ^
            -DGLEW_LIBRARY="%GLEW_ROOT%\lib\Release\x64\glew32.lib"

      - name: Build
        shell: cmd
        run: cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          windeployqt --release --no-translations build\filterGenerator\Release\filterGenerator.exe
          windeployqt --release --no-translations build\filterGenerator\Release\filterRuleTest.exe
          copy "%GLEW_ROOT%\bin\Release\x64\glew32.dll" build\filterGenerator\Release\

      - name: Package
        id: package
        shell: pwsh
        run: |
          $ARTIFACT_NAME = "filterGenerator-windows-x64"
          $SRC_DIR = "build\filterGenerator\Release"
          $OUT_ZIP = "${ARTIFACT_NAME}.zip"

          # Compress the deployed directory
          Compress-Archive -Path "$SRC_DIR\*" -DestinationPath $OUT_ZIP -Force

          $SIZE = (Get-Item $OUT_ZIP).Length / 1MB
          Write-Host "Package created: $OUT_ZIP ($([math]::Round($SIZE, 1)) MB)"
          echo "artifact-name=$ARTIFACT_NAME" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filterGenerator-windows-x64
          path: filterGenerator-windows-x64.zip
          retention-days: 30
