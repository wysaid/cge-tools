name: macOS Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/instructions/**'
      - '.github/skills/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact-arm64:
        description: "macOS arm64 artifact name"
        value: ${{ jobs.build-mac-arm64.outputs.artifact-name }}
      artifact-x86_64:
        description: "macOS x86_64 artifact name"
        value: ${{ jobs.build-mac-x86_64.outputs.artifact-name }}

concurrency:
  group: macos-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-mac-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-latest
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6 (arm64)
        run: |
          brew install qt@6
          echo "QTDIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: macos-arm64-release-${{ hashFiles('CMakeLists.txt', 'cge/CMakeLists.txt', 'filterGenerator/CMakeLists.txt', 'cge/src/**', 'cge/include/**', 'filterGenerator/**/*.cpp', 'filterGenerator/**/*.h') }}
          restore-keys: macos-arm64-release-

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QTDIR" \
            -DBUILD_FILTER_GENERATOR=ON \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Deploy Qt dependencies
        run: |
          macdeployqt build/filterGenerator/filterGenerator.app -verbose=1
          macdeployqt build/filterGenerator/filterRuleTest.app -verbose=1

      - name: Package as DMG
        id: set-artifact
        run: |
          ARTIFACT_NAME="filterGenerator-macos-arm64"
          mkdir -p dist-arm64
          ./build_dmg.sh \
            --app-path build/filterGenerator/filterGenerator.app \
            --output "dist-arm64/filterGenerator-macos-arm64.dmg" \
            --volname "FilterGenerator (arm64)"
          ./build_dmg.sh \
            --app-path build/filterGenerator/filterRuleTest.app \
            --output "dist-arm64/filterRuleTest-macos-arm64.dmg" \
            --volname "FilterRuleTest (arm64)"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filterGenerator-macos-arm64
          path: dist-arm64/*.dmg
          retention-days: 30

  build-mac-x86_64:
    name: macOS x86_64 (Intel)
    runs-on: macos-14
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6 (x86_64)
        run: |
          brew install qt@6
          echo "QTDIR=$(brew --prefix qt@6)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: macos-x86_64-release-${{ hashFiles('CMakeLists.txt', 'cge/CMakeLists.txt', 'filterGenerator/CMakeLists.txt', 'cge/src/**', 'cge/include/**', 'filterGenerator/**/*.cpp', 'filterGenerator/**/*.h') }}
          restore-keys: macos-x86_64-release-

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QTDIR" \
            -DBUILD_FILTER_GENERATOR=ON \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Deploy Qt dependencies
        run: |
          macdeployqt build/filterGenerator/filterGenerator.app -verbose=1
          macdeployqt build/filterGenerator/filterRuleTest.app -verbose=1

      - name: Package as DMG
        id: set-artifact
        run: |
          ARTIFACT_NAME="filterGenerator-macos-x86_64"
          mkdir -p dist-x86_64
          ./build_dmg.sh \
            --app-path build/filterGenerator/filterGenerator.app \
            --output "dist-x86_64/filterGenerator-macos-x86_64.dmg" \
            --volname "FilterGenerator (x86_64)"
          ./build_dmg.sh \
            --app-path build/filterGenerator/filterRuleTest.app \
            --output "dist-x86_64/filterRuleTest-macos-x86_64.dmg" \
            --volname "FilterRuleTest (x86_64)"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filterGenerator-macos-x86_64
          path: dist-x86_64/*.dmg
          retention-days: 30
